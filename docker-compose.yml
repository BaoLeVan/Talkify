version: '3.9'

# ============================================================
#  CHAT APPLICATION — Full Stack Docker Compose
#  Services:
#    - app          : Spring Boot Application
#    - postgres     : PostgreSQL 16 (metadata)
#    - mongodb      : MongoDB 7 (message store)
#    - redis        : Redis 7 (cache, pub/sub, sessions)
#    - kafka        : Apache Kafka KRaft (message broker)
#    - minio        : MinIO S3-compatible (media storage)
#    - prometheus   : Metrics scraping
#    - grafana      : Dashboards & alerting
#    - elasticsearch: Log storage (ELK)
#    - kibana       : Log visualization
#    - filebeat     : Log shipper (Docker → ES)
#    - jaeger        : Distributed tracing
# ============================================================

networks:
  chat-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  kafka_data:
  minio_data:
  prometheus_data:
  grafana_data:
  elasticsearch_data:

services:

  # ─────────────────────────────────────────────────────────
  #  Spring Boot Application
  # ─────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: chat-app:latest
    container_name: talkify
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      # App
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SERVER_PORT: 8080
      SNOWFLAKE_MACHINE_ID: ${SNOWFLAKE_MACHINE_ID:-1}
      # PostgreSQL
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-chat_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-chatuser}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-chatpassword}
      # MongoDB
      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_USER:-chatuser}:${MONGO_PASSWORD:-chatpassword}@mongodb:27017/${MONGO_DB:-chat_db}?authSource=admin
      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redispassword}
      # Kafka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # MinIO
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-chat-media}
      # JWT
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_ACCESS_EXPIRATION_MS: ${JWT_ACCESS_EXPIRATION_MS:-900000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-2592000000}
      # Firebase (push notification)
      FIREBASE_CREDENTIALS_PATH: /app/config/firebase-credentials.json
      # JVM
      JAVA_OPTS: "-Xms512m -Xmx1g -XX:+UseG1GC -Djava.security.egd=file:/dev/./urandom"
    volumes:
      - ./config/firebase-credentials.json:/app/config/firebase-credentials.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      # kafka:
      #   condition: service_healthy
    networks:
      - chat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─────────────────────────────────────────────────────────
  #  PostgreSQL 16
  # ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: chat-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chat_db}
      POSTGRES_USER: ${POSTGRES_USER:-chatuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatpassword}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - chat-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatuser} -d ${POSTGRES_DB:-chat_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────
  #  MongoDB 7
  # ─────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: chat-mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-rootpassword}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-chat_db}
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongodb/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    command: mongod --wiredTigerCacheSizeGB 1 --logpath /var/log/mongod.log
    networks:
      - chat-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────
  #  Redis 7
  # ─────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: chat-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redispassword}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - chat-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

