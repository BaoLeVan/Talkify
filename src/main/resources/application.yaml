server:
  port: 8080


spring:
  application:
    name: talkify

  datasource:
    url: jdbc:postgresql://localhost:5432/chatdb
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mongodb:
    uri: mongodb+srv://warcraftkun:CmeYUkN0DJHeVBmH@cluster0-baole.6bydbes.mongodb.net/talkify_db?appName=Cluster0-BaoLe
    # explicit database name in case it cannot be inferred from the URI
  # alternatively you can set spring.data.mongodb.database directly:
  # data:
  #   mongodb:
  #     database: talkify_db
  data:
  redis:
    host: localhost
    port: 6379
    timeout: 2000

security:
  jwt:
    secret: ${JWT_SECRET_KEY}
    access-token-ttl: 900 # 1 hour in milliseconds
    refresh-token-ttl: 604800 # 7 days in milliseconds
  cors:
    allowed-origins: "*"
    allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
    allowed-headers: "*"

