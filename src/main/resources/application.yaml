server:
  port: 8080


spring:
  application:
    name: talkify

  datasource:
    url: jdbc:postgresql://localhost:5432/chatdb
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false          # tắt log SQL — giảm overhead I/O mỗi request
    open-in-view: false      # tắt OSIV — không giữ DB connection suốt HTTP request
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    mongodb:
      uri: mongodb+srv://warcraftkun:CmeYUkN0DJHeVBmH@cluster0-baole.6bydbes.mongodb.net/talkify_db?appName=Cluster0-BaoLe
      # docker-compose override: SPRING_DATA_MONGODB_URI → mongodb://talkify:talkify@mongodb:27017/...
      auto-index-creation: false
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms          # connection timeout
      connect-timeout: 2000ms  # đổi sang explicit ms unit
  
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

security:
  jwt:
    secret-key: ${JWT_SECRET_KEY}
    access-token-ttl: 900
    refresh-token-ttl: 604800
  cors:
    allowed-origins: "*"
    allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
    allowed-headers: "*"
